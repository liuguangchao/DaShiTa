<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>背包</title>
<link rel="stylesheet" href="css/common.css">
<style>
/* ===== 背包页面专用样式 ===== */
#backpackPage{background:linear-gradient(180deg,#FFE066 0%,#FFD166 30%,#FFB347 100%)}
.backpack-container{background:rgba(255,255,255,.85);border-radius:28px;margin:8px 10px 16px;min-height:calc(100vh - 100px);display:flex;flex-direction:column}
.backpack-tabs{display:flex;gap:0;width:100%;flex-shrink:0}
.backpack-tab{flex:1;padding:12px 0;text-align:center;font-size:15px;color:#5C3300;cursor:pointer;white-space:nowrap;transition:all .3s;font-weight:500;border:none;background:transparent}
.backpack-tab.active{background:linear-gradient(135deg,#FFE066,#FFB347);color:#5C3300;font-weight:700;border-radius:20px}
.backpack-items-wrap{flex:1;overflow-y:auto;padding:12px 10px}
.backpack-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.backpack-item{background:rgba(255,255,255,.6);border-radius:16px;padding:14px 8px;text-align:center;border:1px solid rgba(255,255,255,.5)}
.backpack-item .bi-icon{font-size:52px;margin-bottom:6px;display:block}
.backpack-item .bi-name{font-size:13px;color:#333;font-weight:500;margin-bottom:2px}
.backpack-item .bi-count{font-size:14px;color:#5C3300;font-weight:700}
.backpack-equip{background:rgba(255,255,255,.6);border-radius:16px;padding:14px;display:flex;gap:14px;align-items:center;border:1px solid rgba(255,255,255,.5);margin-top:10px;flex-shrink:0}
.backpack-equip .be-icon{width:90px;height:90px;background:rgba(255,224,102,.3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:56px;flex-shrink:0}
.backpack-equip .be-info{flex:1}
.backpack-equip .be-name{font-size:17px;font-weight:700;color:#333;margin-bottom:4px}
.backpack-equip .be-status{font-size:13px;color:#666;margin-bottom:2px}
.backpack-equip .be-effect{font-size:13px;color:#FF6B35;margin-top:6px}
.backpack-equip .be-btn{padding:10px 20px;border-radius:20px;border:none;background:linear-gradient(135deg,#FFE066,#FFB347);color:#5C3300;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(255,179,71,.3);white-space:nowrap}
</style>
</head>
<body>

<!-- ===================== 3. 背包页面 ===================== -->
<div class="page active" id="backpackPage">
  <div class="bar-top">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <div class="title-center">背包</div>
    <div style="width:60px"></div>
  </div>
  
  <div class="backpack-container">
    <!-- Tab 切换 - 均匀分布 -->
    <div class="backpack-tabs">
      <div class="backpack-tab active" onclick="switchBackpackTab(this)">全部</div>
      <div class="backpack-tab" onclick="switchBackpackTab(this)">武器</div>
      <div class="backpack-tab" onclick="switchBackpackTab(this)">皮肤</div>
      <div class="backpack-tab" onclick="switchBackpackTab(this)">特效</div>
    </div>
    
    <!-- 物品列表 - 可滚动 -->
    <div class="backpack-items-wrap" id="backpackItemsWrap">
      <!-- 动态渲染 -->
    </div>
    
    <!-- 装备详情 -->
    <div class="backpack-equip">
      <div class="be-icon">🪵</div>
      <div class="be-info">
        <div class="be-name">木棍</div>
        <div class="be-status">已装备</div>
        <div class="be-status">伤害 20-25</div>
        <div class="be-effect">专属特效 木纹飞溅</div>
      </div>
      <button class="be-btn" onclick="showToast('已卸下')">卸下</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
/* ===== 背包数据 ===== */
var backpackData = {
  all: [
    {icon:'🪵',name:'木棍',count:1},
    {icon:'🔨',name:'铁锤',count:1},
    {icon:'👟',name:'拖鞋',count:1},
    {icon:'🥿',name:'伤害提升道具',count:3},
    {icon:'🥒',name:'特效触发提升',count:2},
    {icon:'🎁',name:'初级武器体验卡',count:1},
    {icon:'🪙',name:'打屎币',count:1280},
    {icon:'⚡',name:'电击棒',count:2},
    {icon:'🍳',name:'平底锅',count:1},
    {icon:'🏏',name:'棒球棍',count:1},
    {icon:'🔫',name:'激光枪',count:1},
    {icon:'🪄',name:'魔法杖',count:1},
    {icon:'🦵',name:'旋风腿',count:1},
    {icon:'🌟',name:'火花带闪电',count:1},
    {icon:'💦',name:'水花四溅',count:2},
    {icon:'🔥',name:'火焰表情',count:1},
    {icon:'❄️',name:'冰雪表情',count:1},
    {icon:'😈',name:'暗黑表情',count:1}
  ],
  weapon: [
    {icon:'🪵',name:'木棍',count:1},
    {icon:'🔨',name:'铁锤',count:1},
    {icon:'⚡',name:'电击棒',count:2},
    {icon:'🍳',name:'平底锅',count:1},
    {icon:'🏏',name:'棒球棍',count:1},
    {icon:'🔫',name:'激光枪',count:1},
    {icon:'🪄',name:'魔法杖',count:1},
    {icon:'🦵',name:'旋风腿',count:1}
  ],
  skin: [
    {icon:'👟',name:'拖鞋',count:1},
    {icon:'🥿',name:'伤害提升道具',count:3},
    {icon:'🔥',name:'火焰表情',count:1},
    {icon:'❄️',name:'冰雪表情',count:1},
    {icon:'😈',name:'暗黑表情',count:1}
  ],
  effect: [
    {icon:'🥒',name:'特效触发提升',count:2},
    {icon:'🎁',name:'初级武器体验卡',count:1},
    {icon:'🌟',name:'火花带闪电',count:1},
    {icon:'💦',name:'水花四溅',count:2}
  ]
};

/* ===== 渲染物品列表 ===== */
function renderItems(type){
  var wrap = document.getElementById('backpackItemsWrap');
  var items = backpackData[type] || [];
  var html = '<div class="backpack-grid">';
  for(var i = 0; i < items.length; i++){
    html += '<div class="backpack-item">' +
      '<span class="bi-icon">' + items[i].icon + '</span>' +
      '<div class="bi-name">' + items[i].name + '</div>' +
      '<div class="bi-count">x' + items[i].count + '</div>' +
    '</div>';
  }
  html += '</div>';
  wrap.innerHTML = html;
}

/* ===== 背包 Tab 切换 ===== */
function switchBackpackTab(el){
  el.parentElement.querySelectorAll('.backpack-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  var texts = ['全部','武器','皮肤','特效'];
  var types = ['all','weapon','skin','effect'];
  for(var i = 0; i < texts.length; i++){
    if(el.textContent.trim() === texts[i]){
      renderItems(types[i]);
      break;
    }
  }
}

/* ===== 初始化 ===== */
window.addEventListener('DOMContentLoaded', function(){
  renderItems('all');
});
</script>

</body>
</html>
