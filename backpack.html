<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>背包</title>
<link rel="stylesheet" href="css/common.css">
<style>
/* ===== 背包页面专用样式 ===== */
#backpackPage{background:linear-gradient(180deg,#FFE066 0%,#FFD166 30%,#FFB347 100%)}
.backpack-container{background:rgba(255,255,255,.85);border-radius:28px;margin:8px 10px 16px;min-height:calc(100vh - 100px);display:flex;flex-direction:column}
.backpack-tabs{display:flex;gap:0;width:100%;flex-shrink:0}
.backpack-tab{flex:1;padding:12px 0;text-align:center;font-size:15px;color:#5C3300;cursor:pointer;white-space:nowrap;transition:all .3s;font-weight:500;border:none;background:transparent}
.backpack-tab.active{background:linear-gradient(135deg,#FFE066,#FFB347);color:#5C3300;font-weight:700;border-radius:20px}
.backpack-items-wrap{max-height:calc(100vh - 290px);overflow-y:auto;padding:12px 10px}
.backpack-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.backpack-item{background:rgba(255,255,255,.6);border-radius:16px;padding:14px 8px;text-align:center;border:1px solid rgba(255,255,255,.5);cursor:pointer;transition:all .15s}
.backpack-item:active{transform:scale(.95);background:rgba(255,224,102,.4)}
.backpack-item.selected{background:rgba(255,224,102,.5);border-color:#FFB347}
.backpack-item .bi-icon{font-size:52px;margin-bottom:6px;display:block}
.backpack-item .bi-name{font-size:13px;color:#333;font-weight:500;margin-bottom:2px}
.backpack-item .bi-count{font-size:14px;color:#5C3300;font-weight:700}
.backpack-equip{background:rgba(255,255,255,.6);border-radius:16px;padding:14px;display:flex;gap:14px;align-items:center;border:1px solid rgba(255,255,255,.5);margin-top:10px;flex-shrink:0;transition:all .3s}
.backpack-equip.hidden{opacity:0;max-height:0;padding:0;margin:0;overflow:hidden;border:none}
.backpack-equip .be-icon{width:90px;height:90px;background:rgba(255,224,102,.3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:56px;flex-shrink:0}
.backpack-equip .be-info{flex:1}
.backpack-equip .be-name{font-size:17px;font-weight:700;color:#333;margin-bottom:4px}
.backpack-equip .be-status{font-size:13px;color:#666;margin-bottom:2px}
.backpack-equip .be-effect{font-size:13px;color:#FF6B35;margin-top:6px}
.backpack-equip .be-btn{padding:10px 20px;border-radius:20px;border:none;background:linear-gradient(135deg,#FFE066,#FFB347);color:#5C3300;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(255,179,71,.3);white-space:nowrap}
</style>
</head>
<body>

<!-- ===================== 3. 背包页面 ===================== -->
<div class="page active" id="backpackPage">
  <div class="bar-top">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <div class="title-center">背包</div>
    <div style="width:60px"></div>
  </div>
  
  <div class="backpack-container">
    <!-- Tab 切换 - 均匀分布 -->
    <div class="backpack-tabs">
      <div class="backpack-tab active" onclick="switchBackpackTab(this)">全部</div>
      <div class="backpack-tab" onclick="switchBackpackTab(this)">武器</div>
      <div class="backpack-tab" onclick="switchBackpackTab(this)">他的皮肤</div>
      <div class="backpack-tab" onclick="switchBackpackTab(this)">特效</div>
    </div>
    
    <!-- 物品列表 - 可滚动 -->
    <div class="backpack-items-wrap" id="backpackItemsWrap">
      <!-- 动态渲染 -->
    </div>
    
    <!-- 装备详情（默认隐藏） -->
    <div class="backpack-equip hidden" id="equipDetail">
      <div class="be-icon" id="equipIcon">🪵</div>
      <div class="be-info">
        <div class="be-name" id="equipName">木棍</div>
        <div class="be-status" id="equipStatus">未装备</div>
        <div class="be-status" id="equipDamage">伤害 20-25</div>
        <div class="be-effect" id="equipEffect">专属特效 木纹飞溅</div>
      </div>
      <button class="be-btn" id="equipBtn" onclick="handleEquipBtn()">装备</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
/* ===== 背包数据 ===== */
var backpackData = {
  all: [
    {icon:'🪵',name:'木棍',count:1,damage:'伤害 20-25',effect:'专属特效 木纹飞溅'},
    {icon:'🔨',name:'铁锤',count:1,damage:'伤害 30-40',effect:'专属特效 铁锤重击'},
    {icon:'👟',name:'拖鞋',count:1,damage:'伤害 10-15',effect:'专属特效 拖鞋暴击'},
    {icon:'🥿',name:'伤害提升道具',count:3,damage:'全伤害+10%',effect:'被动增益'},
    {icon:'🥒',name:'特效触发提升',count:2,damage:'特效概率+20%',effect:'被动增益'},
    {icon:'🎁',name:'初级武器体验卡',count:1,damage:'临时武器',effect:'体验卡2小时'},
    {icon:'🪙',name:'打屎币',count:1280,damage:'',effect:'游戏货币'},
    {icon:'⚡',name:'电击棒',count:2,damage:'伤害 25-35',effect:'专属特效 电击麻痹'},
    {icon:'🍳',name:'平底锅',count:1,damage:'伤害 15-20',effect:'专属特效 锅气爆发'},
    {icon:'🏏',name:'棒球棍',count:1,damage:'伤害 22-30',effect:'专属特效 全垒打'},
    {icon:'🔫',name:'激光枪',count:1,damage:'伤害 40-50',effect:'专属特效 激光束'},
    {icon:'🪄',name:'魔法杖',count:1,damage:'伤害 35-45',effect:'专属特效 魔法闪光'},
    {icon:'🦵',name:'旋风腿',count:1,damage:'伤害 28-38',effect:'专属特效 旋风踢'},
    {icon:'🌟',name:'火花带闪电',count:1,damage:'特效伤害+50%',effect:'主动特效'},
    {icon:'💦',name:'水花四溅',count:2,damage:'特效伤害+30%',effect:'主动特效'},
    {icon:'🔥',name:'火焰表情',count:1,damage:'',effect:'表情皮肤'},
    {icon:'❄️',name:'冰雪表情',count:1,damage:'',effect:'表情皮肤'},
    {icon:'😈',name:'暗黑表情',count:1,damage:'',effect:'表情皮肤'}
  ],
  weapon: [
    {icon:'🪵',name:'木棍',count:1,damage:'伤害 20-25',effect:'专属特效 木纹飞溅'},
    {icon:'🔨',name:'铁锤',count:1,damage:'伤害 30-40',effect:'专属特效 铁锤重击'},
    {icon:'⚡',name:'电击棒',count:2,damage:'伤害 25-35',effect:'专属特效 电击麻痹'},
    {icon:'🍳',name:'平底锅',count:1,damage:'伤害 15-20',effect:'专属特效 锅气爆发'},
    {icon:'🏏',name:'棒球棍',count:1,damage:'伤害 22-30',effect:'专属特效 全垒打'},
    {icon:'🔫',name:'激光枪',count:1,damage:'伤害 40-50',effect:'专属特效 激光束'},
    {icon:'🪄',name:'魔法杖',count:1,damage:'伤害 35-45',effect:'专属特效 魔法闪光'},
    {icon:'🦵',name:'旋风腿',count:1,damage:'伤害 28-38',effect:'专属特效 旋风踢'}
  ],
  skin: [
    {icon:'👟',name:'拖鞋',count:1,damage:'伤害 10-15',effect:'专属特效 拖鞋暴击'},
    {icon:'🥿',name:'伤害提升道具',count:3,damage:'全伤害+10%',effect:'被动增益'},
    {icon:'🔥',name:'火焰表情',count:1,damage:'',effect:'表情皮肤'},
    {icon:'❄️',name:'冰雪表情',count:1,damage:'',effect:'表情皮肤'},
    {icon:'😈',name:'暗黑表情',count:1,damage:'',effect:'表情皮肤'}
  ],
  effect: [
    {icon:'🥒',name:'特效触发提升',count:2,damage:'特效概率+20%',effect:'被动增益'},
    {icon:'🎁',name:'初级武器体验卡',count:1,damage:'临时武器',effect:'体验卡2小时'},
    {icon:'🌟',name:'火花带闪电',count:1,damage:'特效伤害+50%',effect:'主动特效'},
    {icon:'💦',name:'水花四溅',count:2,damage:'特效伤害+30%',effect:'主动特效'}
  ]
};

var selectedItem = null;
var equipStates = {}; // 记录每个物品的装备状态

/* ===== 渲染物品列表 ===== */
function renderItems(type){
  var wrap = document.getElementById('backpackItemsWrap');
  var items = backpackData[type] || [];
  var html = '<div class="backpack-grid">';
  for(var i = 0; i < items.length; i++){
    var idx = items[i].name;
    var isSelected = selectedItem && selectedItem.name === idx ? 'selected' : '';
    html += '<div class="backpack-item ' + isSelected + '" onclick="selectItem(this, ' + JSON.stringify(items[i]).replace(/"/g, '&quot;') + ')">' +
      '<span class="bi-icon">' + items[i].icon + '</span>' +
      '<div class="bi-name">' + items[i].name + '</div>' +
      '<div class="bi-count">x' + items[i].count + '</div>' +
    '</div>';
  }
  html += '</div>';
  wrap.innerHTML = html;
}

/* ===== 选择物品 ===== */
function selectItem(el, item){
  // 清除之前的选中
  document.querySelectorAll('.backpack-item').forEach(function(d){d.classList.remove('selected')});
  el.classList.add('selected');
  selectedItem = item;
  
  // 随机装备/卸下状态
  if(equipStates[item.name] === undefined){
    equipStates[item.name] = Math.random() > 0.5;
  }
  
  // 更新装备详情
  document.getElementById('equipIcon').textContent = item.icon;
  document.getElementById('equipName').textContent = item.name;
  document.getElementById('equipStatus').textContent = equipStates[item.name] ? '已装备' : '未装备';
  document.getElementById('equipDamage').textContent = item.damage || '';
  document.getElementById('equipEffect').textContent = item.effect || '';
  
  var btn = document.getElementById('equipBtn');
  btn.textContent = equipStates[item.name] ? '卸下' : '装备';
  
  // 显示装备详情
  document.getElementById('equipDetail').classList.remove('hidden');
}

/* ===== 装备/卸下按钮 ===== */
function handleEquipBtn(){
  if(!selectedItem) return;
  equipStates[selectedItem.name] = !equipStates[selectedItem.name];
  document.getElementById('equipStatus').textContent = equipStates[selectedItem.name] ? '已装备' : '未装备';
  document.getElementById('equipBtn').textContent = equipStates[selectedItem.name] ? '卸下' : '装备';
  showToast(equipStates[selectedItem.name] ? '已装备：' + selectedItem.name : '已卸下：' + selectedItem.name);
}

/* ===== 背包 Tab 切换 ===== */
function switchBackpackTab(el){
  el.parentElement.querySelectorAll('.backpack-tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  var texts = ['全部','武器','他的皮肤','特效'];
  var types = ['all','weapon','skin','effect'];
  for(var i = 0; i < texts.length; i++){
    if(el.textContent.trim() === texts[i]){
      selectedItem = null;
      document.getElementById('equipDetail').classList.add('hidden');
      renderItems(types[i]);
      break;
    }
  }
}

/* ===== 初始化 ===== */
window.addEventListener('DOMContentLoaded', function(){
  renderItems('all');
});
</script>

</body>
</html>
