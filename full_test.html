<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Test</title>
<style>
body { font-family: Arial, sans-serif; padding: 20px; }
.scroll-row { width: 100%; margin-bottom: 10px; position: relative; display: flex; align-items: center; }
.scroll-row .scroll-wrapper { flex: 1; position: relative; overflow: hidden; margin: 0 8px; border-radius: 12px; height: 110px; }
.scroll-row .scroll-btn { width: 30px; height: 30px; border-radius: 50%; background: rgba(92,51,0,.15); border: 1px solid rgba(92,51,0,.25); font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; user-select: none; color: #5C3300; z-index: 10; }
.scroll-btn:active { background: rgba(92,51,0,.3); }
.scroll-track { display: flex; gap: 10px; will-change: transform; transform: translateX(0); }
.grid-item { background: rgba(255,255,255,.12); border-radius: 16px; padding: 14px 8px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,.2); flex: 0 0 auto; width: 100px; }
.grid-item .icon { font-size: 36px; margin-bottom: 4px; }
.grid-item .name { font-size: 12px; color: #333; font-weight: 600; }
.grid-item .count { font-size: 11px; color: #999; margin-top: 2px; }
</style>
</head>
<body>
<h1>Scroll Row Test</h1>
<div id="test1">
  <div class="scroll-row" id="scrollRowTest">
    <div class="scroll-btn">◀</div>
    <div class="scroll-wrapper">
      <div class="scroll-track">
        <div class="grid-item"><div class="icon">⚔️</div><div class="name">木剑</div><div class="count">🪙 100</div></div>
        <div class="grid-item"><div class="icon">🔨</div><div class="name">铁锤</div><div class="count">🪙 200</div></div>
        <div class="grid-item"><div class="icon">⚡</div><div class="name">电击棒</div><div class="count">🪙 500</div></div>
        <div class="grid-item"><div class="icon">🍳</div><div class="name">平底锅</div><div class="count">🪙 300</div></div>
        <div class="grid-item"><div class="icon">🏏</div><div class="name">棒球棍</div><div class="count">🪙 400</div></div>
        <div class="grid-item"><div class="icon">⚔️</div><div class="name">木剑</div><div class="count">🪙 100</div></div>
        <div class="grid-item"><div class="icon">🔨</div><div class="name">铁锤</div><div class="count">🪙 200</div></div>
        <div class="grid-item"><div class="icon">⚡</div><div class="name">电击棒</div><div class="count">🪙 500</div></div>
        <div class="grid-item"><div class="icon">🍳</div><div class="name">平底锅</div><div class="count">🪙 300</div></div>
        <div class="grid-item"><div class="icon">🏏</div><div class="name">棒球棍</div><div class="count">🪙 400</div></div>
      </div>
    </div>
    <div class="scroll-btn">▶</div>
  </div>
</div>

<script>
(function initScrollRows() {
  const rows = document.querySelectorAll('.scroll-row');
  
  rows.forEach((row) => {
    const track = row.querySelector('.scroll-track');
    if (!track) return;
    
    // 复制一份实现无缝循环
    const items = track.innerHTML;
    track.innerHTML = items + items;
    
    // 等待 DOM 更新后获取宽度
    setTimeout(() => {
      const halfWidth = track.scrollWidth / 2;
      let currentPos = 0;
      const speed = 0.5;
      
      console.log('Initializing scroll row, halfWidth:', halfWidth, 'track scrollWidth:', track.scrollWidth);
      
      // 用 setInterval 做动画
      const timer = setInterval(() => {
        currentPos -= speed;
        if (currentPos <= -halfWidth) {
          currentPos = 0;
        }
        track.style.transform = `translateX(${currentPos}px)`;
      }, 16); // ~60fps
      
      console.log('Animation started, timer ID:', timer);
      
      // 按钮点击
      const btns = row.querySelectorAll('.scroll-btn');
      btns.forEach((btn, i) => {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          clearInterval(timer); // 暂停自动滚动
          
          const itemWidth = 120;
          const targetItems = i === 0 ? -3 : 3;
          currentPos += targetItems * itemWidth;
          if (currentPos > 0) currentPos = 0;
          if (currentPos < -halfWidth) currentPos = -halfWidth;
          track.style.transform = `translateX(${currentPos}px)`;
          
          console.log('Button clicked:', i, 'New pos:', currentPos);
          
          // 1秒后恢复自动滚动
          setTimeout(() => {
            const newTimer = setInterval(() => {
              currentPos -= speed;
              if (currentPos <= -halfWidth) {
                currentPos = 0;
              }
              track.style.transform = `translateX(${currentPos}px)`;
            }, 16);
            console.log('Resumed animation with timer:', newTimer);
          }, 1000);
        });
      });
    }, 200);
  });
})();
</script>
</body>
</html>
