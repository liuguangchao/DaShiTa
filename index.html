<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>打屎他</title>
<link rel="stylesheet" href="css/common.css">
</head>
<body>

<!-- ===================== 1. 首页 ===================== -->
<div class="page active" id="homePage">
  <div class="bar-top">
    <img src="./images/logo.png" alt="打屎他" style="height:48px">
    <div style="display:flex;gap:8px">
      <button class="icon-btn-img" onclick="showToast('签到成功！+20打屎币')" style="width:44px;height:44px"><img src="./images/checkin.png" alt="签到" style="width:36px;height:36px"></button>
      <button class="icon-btn-img" onclick="window.location.href='shop.html'" style="width:44px;height:44px"><img src="./images/shop.png" alt="商城" style="width:36px;height:36px"></button>
      <button class="icon-btn-img" onclick="window.location.href='backpack.html'" style="width:44px;height:44px"><img src="./images/backpack.png" alt="背包" style="width:36px;height:36px"></button>
      <button class="icon-btn-img" onclick="window.location.href='msg-list.html'" style="width:44px;height:44px"><img src="./images/message.png" alt="消息" style="width:40px;height:40px"></button>
      <button class="icon-btn-img" onclick="window.location.href='leaderboard.html'" style="width:44px;height:44px;overflow:visible"><img src="./images/leaderboard.png" alt="排行榜" style="width:36px;height:36px"></button>
      <button class="icon-btn-img" onclick="window.location.href='settings.html'" style="width:44px;height:44px"><img src="./images/settings.png" alt="设置" style="width:40px;height:40px"></button>
    </div>
  </div>

  <!-- 七日签到卡片 -->
  <div class="sign-card">
    <div class="sign-card-top">
      <div class="sign-header">
        <div class="calendar-icon"><div class="calendar-icon-inner"></div></div>
        <div class="sign-title-text">七日连续签到</div>
      </div>
    </div>
    <div class="week-grid" id="weekGrid">
      <div class="day-box done"><span class="day-num">1</span><span class="day-icon">✓</span></div>
      <div class="day-box done"><span class="day-num">2</span><span class="day-icon">✓</span></div>
      <div class="day-box done"><span class="day-num">3</span><span class="day-icon">✓</span></div>
      <div class="day-box today" id="todayBox"><span class="day-num">4</span><span class="day-icon">✨</span></div>
      <div class="day-box lock"><span class="day-num">5</span><span class="day-icon">·</span></div>
      <div class="day-box lock"><span class="day-num">6</span><span class="day-icon">·</span></div>
      <div class="day-box lock"><span class="day-num">7</span><span class="day-icon">·</span></div>
    </div>
  </div>

  <!-- 模式选择 -->
  <div style="display:flex;gap:8px;margin:14px 0">
    <div class="card mode-card" style="flex:1 1 0%;cursor:pointer;text-align:center;border-radius:14px;padding:0;overflow:hidden;background:transparent;border:none;box-shadow:none;outline:3px solid #FF6B35" onclick="selectMode('mole')" data-mode="mole">
      <img src="./images/mole-mode-bg.png" style="width:104.29%;height:auto;display:block;border-radius:14px;pointer-events:none" alt="打地鼠模式">
    </div>
    <div class="card mode-card" style="flex:1 1 0%;cursor:pointer;text-align:center;border-radius:14px;padding:0;overflow:hidden;background:transparent;border:none;box-shadow:none;outline:none" onclick="selectMode('figure')" data-mode="figure">
      <img src="./images/figure-mode-bg.png" style="width:100%;height:auto;display:block;border-radius:14px;pointer-events:none" alt="虚拟人物打击模式">
    </div>
  </div>

  <!-- 免责声明 -->
  <div style="
    width:calc(100% - 32px);margin:14px 16px;display:block;border-radius:999px;
    background:linear-gradient(90deg,#FFC970 0%,#FFF2D0 50%,#FFC970 100%);
    border:2px solid #945018;box-shadow:0 3px 0 #F5E0BC,inset 0 2px 3px rgba(255,255,255,.4);
    padding:14px 20px;text-align:center;">
    <span style="font-size:20px;font-weight:800;color:#4E2408;text-shadow:1px 1px 0 rgba(255,255,255,.35);letter-spacing:1px">
      本游戏仅用于情绪解压，请勿模仿或传播暴力行为
    </span>
  </div>

  <!-- 开始按钮 -->
  <div style="text-align:center;padding:0 16px 30px">
    <img src="./images/start-btn.png" alt="开始宣泄" style="height:60px;cursor:pointer" onclick="startFromHome()">
    <div style="font-size:14px;color:#8B6914;margin-top:10px;opacity:.7">选择模式后开始</div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
/* ===== 首页逻辑 ===== */
var selectedMode = null;

/* ===== 选择模式 ===== */
function selectMode(mode) {
  selectedMode = mode;
  document.querySelectorAll('.mode-card').forEach(function(card) {
    card.style.outline = 'none';
  });
  var activeCard = document.querySelector('[data-mode="' + mode + '"]');
  activeCard.style.outline = '3px solid #FF6B35';
  showToast('已选择' + (mode === 'mole' ? '打地鼠' : '虚拟人物') + '模式');
}

/* ===== 从首页开始游戏 ===== */
function startFromHome() {
  if (!selectedMode) {
    showToast('请先选择模式');
    return;
  }
  if (selectedMode === 'mole') {
    window.location.href = 'mole-game.html';
  } else {
    window.location.href = 'figure-game.html';
  }
}

/* ===== 签到功能 ===== */
var hasSignedInToday = false;

function initSignIn() {
  var today = new Date().toDateString();
  var lastSignIn = localStorage.getItem('lastSignInDate');
  var todayBox = document.getElementById('todayBox');
  
  if (lastSignIn === today) {
    // 今天已签到，标记为done，禁用点击
    hasSignedInToday = true;
    if (todayBox) {
      todayBox.className = 'day-box done';
      todayBox.innerHTML = '<span class="day-num">4</span><span class="day-icon">✓</span>';
      todayBox.onclick = null;
      todayBox.style.cursor = 'default';
    }
    return;
  }
  
  // 今天未签到，绑定点击事件（使用 once 标志防止重复绑定）
  if (todayBox && !todayBox.dataset.bound) {
    todayBox.dataset.bound = 'true';
    todayBox.style.cursor = 'pointer';
    todayBox.onclick = function(e) {
      e.preventDefault();
      e.stopPropagation();
      doSignIn(todayBox);
    };
  }
}

function doSignIn(todayBox) {
  // 防止重复点击
  if (hasSignedInToday) {
    return;
  }
  
  var today = new Date().toDateString();
  
  // 立即写入localStorage，防止重复点击
  localStorage.setItem('lastSignInDate', today);
  hasSignedInToday = true;
  
  // 立即禁用点击
  if (todayBox) {
    todayBox.onclick = null;
    todayBox.style.cursor = 'default';
  }
  
  // 更新UI：将今天标记为done
  if (todayBox) {
    todayBox.className = 'day-box done';
    todayBox.innerHTML = '<span class="day-num">4</span><span class="day-icon">✓</span>';
  }
  
  // 解锁下一天
  var dayBoxes = document.querySelectorAll('.day-box');
  for (var i = 0; i < dayBoxes.length; i++) {
    if (dayBoxes[i].classList.contains('lock') && parseInt(dayBoxes[i].querySelector('.day-num').textContent) === 5) {
      dayBoxes[i].className = 'day-box today';
      dayBoxes[i].innerHTML = '<span class="day-num">5</span><span class="day-icon">✨</span>';
      break;
    }
  }
  
  showToast('签到成功！+20打屎币');
}

// 页面加载时初始化签到
window.addEventListener('DOMContentLoaded', function() {
  initSignIn();
});
</script>
</body>
</html>
