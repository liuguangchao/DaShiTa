<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>打地鼠模式</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: #8BC34A;
    }
    .game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    .game-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #8BC34A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.5s;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 44px;
      height: 44px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #5C3300;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    .back-btn:active {
      transform: scale(0.9);
    }
  </style>
</head>
<body>
  <div class="game-container">
    <!-- 返回按钮 -->
    <div class="back-btn" onclick="window.history.back()">←</div>
    
    <!-- 加载提示 -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在加载游戏...</div>
    </div>
    
    <!-- Cocos 游戏 iframe -->
    <iframe 
      class="game-iframe" 
      src="cocos-build/mole-game/index.html" 
      id="gameIframe"
      onload="hideLoading()"
      allowfullscreen
    ></iframe>
  </div>

  <script>
    // 隐藏加载提示
    function hideLoading() {
      const overlay = document.getElementById('loadingOverlay');
      if (overlay) {
        overlay.style.opacity = '0';
        setTimeout(() => {
          overlay.style.display = 'none';
        }, 500);
      }
    }
    
    // 错误处理
    document.getElementById('gameIframe').addEventListener('error', function() {
      alert('游戏加载失败，请刷新重试');
    });
    
    // 确保 iframe 加载完成后隐藏 loading
    window.addEventListener('load', function() {
      setTimeout(hideLoading, 1000);
    });
  </script>
</body>
</html>
