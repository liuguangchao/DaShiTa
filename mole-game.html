<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>打地鼠模式</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: #A8D56C;
    }
    .game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      background-image: url('./images/grass-bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    
    /* 顶部圆角卡片 */
    .top-card {
      margin: 12px 12px 8px;
      background: linear-gradient(180deg, #FFE082 0%, #FFD54F 100%);
      border-radius: 20px;
      border: 3px solid #F57F17;
      box-shadow: 0 4px 0 #F57F17, 0 8px 16px rgba(0,0,0,0.15);
      padding: 12px 16px;
      position: relative;
      z-index: 10;
    }
    .top-card-row1 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .back-btn {
      width: 44px;
      height: 44px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #F57F17;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      border: 2px solid #FFD54F;
    }
    .game-title {
      font-size: 36px;
      font-weight: 900;
      color: #5D4037;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
      letter-spacing: 2px;
    }
    .stats-panel {
      text-align: right;
      color: #5D4037;
      font-size: 13px;
      line-height: 1.5;
    }
    .stats-panel .time-label { font-weight: bold; font-size: 15px; }
    .stats-panel .time-value { font-size: 18px; font-weight: 900; }
    .stats-panel .damage-label { font-size: 12px; opacity: 0.8; }
    .stats-panel .damage-value { font-size: 22px; font-weight: 900; color: #E65100; }
    
    /* 游戏区域 */
    .game-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin: 8px 12px;
    }
    
    /* 草地装饰 */
    .grass-decoration {
      position: absolute;
      font-size: 24px;
      opacity: 0.6;
      pointer-events: none;
    }
    .flower1 { top: 20px; left: 30px; font-size: 30px; }
    .flower2 { top: 60px; right: 40px; }
    .flower3 { bottom: 100px; left: 50px; }
    .flower4 { bottom: 60px; right: 60px; font-size: 20px; }
    .flower5 { top: 150px; left: 80px; font-size: 18px; }
    .bush1 { top: 40px; right: 20px; font-size: 36px; }
    .rock1 { top: 30px; left: 10px; font-size: 28px; }
    
    /* 地鼠网格 - 菱形排列 */
    .moles-grid {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 400px;
      height: 70%;
    }
    .mole-row {
      display: flex;
      justify-content: center;
      gap: 50px;
      margin-bottom: 50px;
    }
    .mole-row:last-child {
      margin-bottom: 0;
    }
    .mole-row-1 {
      gap: 120px;
    }
    .mole-row-2 {
      gap: 80px;
    }
    .mole-row-3 {
      gap: 120px;
    }
    .mole-hole {
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      cursor: pointer;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
    }
    .hole-base {
      width: 120px;
      height: 74px;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      background-image: url('./images/mole-hole.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
    }
    .mole-face {
      font-size: 50px;
      position: relative;
      z-index: 2;
    }
    
    /* 特效标记 */
    
    /* 底部圆角卡片 */
    .bottom-card {
      margin: 8px 12px 12px;
      background: linear-gradient(180deg, #FFF8E1 0%, #FFE0B2 100%);
      border-radius: 24px;
      border: 3px solid #FFB300;
      box-shadow: 0 4px 0 #FFB300, 0 8px 16px rgba(0,0,0,0.15);
      padding: 16px;
      position: relative;
      z-index: 10;
    }
    .weapon-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .weapon-selector {
      width: 110px;
      height: 85px;
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      border: 3px solid #FFB300;
    }
    .weapon-icon {
      font-size: 44px;
      margin-bottom: 4px;
    }
    .weapon-name {
      font-size: 14px;
      font-weight: bold;
      color: #5D4037;
    }
    .weapon-check {
      font-size: 12px;
      color: #4CAF50;
      margin-top: 2px;
    }
    .action-buttons {
      flex: 1;
      display: flex;
      gap: 12px;
    }
    .action-btn {
      flex: 1;
      height: 65px;
      border: none;
      border-radius: 32px;
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,0.25);
      transition: transform 0.1s;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .action-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.25);
    }
    .btn-heavy {
      background: linear-gradient(135deg, #FF6B35, #FF8C42);
      box-shadow: 0 5px 0 #E65100;
    }
    .btn-switch {
      background: linear-gradient(135deg, #FFB300, #FFD54F);
      color: #5D4037;
      box-shadow: 0 5px 0 #FF8F00;
    }
    
    /* 飘字效果 */
    .floating-text {
      position: absolute;
      color: #FFD700;
      font-size: 28px;
      font-weight: 900;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.6), 0 0 10px rgba(255,215,0,0.5);
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      z-index: 100;
    }
    
    /* 5秒倒计时遮罩 */
    .countdown-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    .countdown-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .countdown-number {
      font-size: 120px;
      font-weight: 900;
      color: #FFD700;
      text-shadow: 0 0 30px rgba(255,215,0,0.8);
      animation: countdownPulse 1s ease-in-out infinite;
    }
    .countdown-text {
      font-size: 24px;
      color: #fff;
      margin-top: 20px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    @keyframes countdownPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    
    /* 游戏结束弹窗 */
    .game-over-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .game-over-modal.show {
      display: flex;
    }
    .game-over-card {
      background: linear-gradient(135deg, #FFF8E1, #FFE082);
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      border: 3px solid #FFB300;
      animation: modalPopIn 0.4s ease-out;
      max-width: 320px;
      width: 90%;
    }
    @keyframes modalPopIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .game-over-emoji {
      font-size: 60px;
      margin-bottom: 15px;
    }
    .game-over-title {
      font-size: 28px;
      font-weight: 900;
      color: #E65100;
      margin-bottom: 10px;
    }
    .game-over-score {
      font-size: 48px;
      font-weight: 900;
      color: #FF6F00;
      margin: 15px 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }
    .game-over-label {
      font-size: 16px;
      color: #5D4037;
      margin-bottom: 25px;
    }
    .game-over-btn {
      background: linear-gradient(135deg, #FFB300, #FF8F00);
      color: #fff;
      border: none;
      padding: 10px 30px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 0 #E65100;
      transition: transform 0.1s;
    }
    .game-over-btn.exit-btn {
      background: linear-gradient(135deg, #9E9E9E, #757575);
      box-shadow: 0 4px 0 #616161;
    }
    .game-over-btn.exit-btn:active {
      box-shadow: 0 2px 0 #616161;
    }
    .game-over-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <!-- 顶部圆角卡片 -->
    <div class="top-card">
      <div class="top-card-row1">
        <div class="back-btn" onclick="window.history.back()">←</div>
        <div class="game-title">打地鼠模式</div>
        <div class="stats-panel">
          <div class="time-label">剩余时间</div>
          <div class="time-value">01:30</div>
          <div class="damage-label">打鼠数量</div>
          <div class="damage-value">0</div>
        </div>
      </div>
    </div>
    
    <!-- 游戏区域 -->
    <div class="game-area">
      <!-- 草地装饰 -->
      <div class="grass-decoration flower1">🌸</div>
      <div class="grass-decoration flower2">🌼</div>
      <div class="grass-decoration flower3">🌺</div>
      <div class="grass-decoration flower4">🌻</div>
      <div class="grass-decoration flower5">🌷</div>
      <div class="grass-decoration bush1">🌿</div>
      <div class="grass-decoration rock1">🪨</div>
      
      <!-- 地鼠网格 - 菱形排列 -->
      <div class="moles-grid">
        <!-- 第一行：2个 -->
        <div class="mole-row mole-row-1">
          <div class="mole-hole" onclick="hitMole(this)">
            <div class="mole-face-wrapper">
              <span class="mole-face">🐹</span>
            </div>
            <div class="hole-base"></div>
          </div>
          <div class="mole-hole" onclick="hitMole(this)">
            <div class="mole-face-wrapper">
              <span class="mole-face">🐹</span>
            </div>
            <div class="hole-base"></div>
          </div>
        </div>
        <!-- 第二行：3个 -->
        <div class="mole-row mole-row-2">
          <div class="mole-hole" onclick="hitMole(this)">
            <div class="mole-face-wrapper">
              <span class="mole-face">🐹</span>
            </div>
            <div class="hole-base"></div>
          </div>
          <div class="mole-hole" onclick="hitMole(this)">
            <div class="mole-face-wrapper">
              <span class="mole-face">🐹</span>
            </div>
            <div class="hole-base"></div>
          </div>
          <div class="mole-hole" onclick="hitMole(this)">
            <div class="mole-face-wrapper">
              <span class="mole-face">🐹</span>
            </div>
            <div class="hole-base"></div>
          </div>
        </div>
        <!-- 第三行：2个 -->
        <div class="mole-row mole-row-3">
          <div class="mole-hole" onclick="hitMole(this)">
            <div class="mole-face-wrapper">
              <span class="mole-face">🐹</span>
            </div>
            <div class="hole-base"></div>
          </div>
          <div class="mole-hole" onclick="hitMole(this)">
            <div class="mole-face-wrapper">
              <span class="mole-face">🐹</span>
            </div>
            <div class="hole-base"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
      <div class="game-over-card">
        <div class="game-over-emoji">🎉</div>
        <div class="game-over-title">时间到！</div>
        <div class="game-over-score" id="finalScore">0</div>
        <div class="game-over-label">只老鼠被你打死</div>
        <div class="game-over-buttons">
          <button class="game-over-btn" onclick="closeGameOver()">再来一局</button>
          <button class="game-over-btn exit-btn" onclick="exitToHome()">返回首页</button>
        </div>
      </div>
    </div>
    
    <!-- 5秒倒计时遮罩 -->
    <div class="countdown-overlay" id="countdownOverlay">
      <div class="countdown-number" id="countdownNumber">5</div>
      <div class="countdown-text">游戏即将开始...</div>
    </div>
    
    <!-- 底部圆角卡片 -->
    <div class="bottom-card">
      <div class="weapon-actions">
        <div class="weapon-selector">
          <div class="weapon-icon">🔨</div>
          <div class="weapon-name">✓ 拖鞋</div>
        </div>
        <div class="action-buttons">
          <button class="action-btn btn-heavy" onclick="heavyAttack()">重锤</button>
          <button class="action-btn btn-switch" onclick="switchWeapon()">切换武器</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let score = 0;
    let timeLeft = 90;
    let gameTimer = null;
    let countdownTimer = null;
    
    // 5秒倒计时
    function startFiveSecondCountdown() {
      let count = 5;
      const overlay = document.getElementById('countdownOverlay');
      const numberEl = document.getElementById('countdownNumber');
      
      countdownTimer = setInterval(() => {
        count--;
        if (count > 0) {
          numberEl.textContent = count;
        } else {
          // 倒计时结束，隐藏遮罩
          clearInterval(countdownTimer);
          overlay.classList.add('hidden');
          setTimeout(() => {
            overlay.style.display = 'none';
            startGameCountdown();
          }, 500);
        }
      }, 1000);
    }
    
    // 游戏倒计时（90秒）
    function startGameCountdown() {
      gameTimer = setInterval(() => {
        timeLeft--;
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.querySelector('.time-value').textContent = 
          `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        if (timeLeft <= 0) {
          clearInterval(gameTimer);
          showGameOver(score);
        }
      }, 1000);
    }
    
    function hitMole(element) {
      // 播放击中动画
      const faceWrapper = element.querySelector('.mole-face-wrapper');
      if (faceWrapper) {
        faceWrapper.style.transition = 'transform 0.15s';
        faceWrapper.style.transform = 'scale(0.8)';
        setTimeout(() => {
          faceWrapper.style.transform = 'scale(1)';
        }, 150);
      }
      
      // 打鼠数量 +1
      score++;
      document.querySelector('.damage-value').textContent = score;
      
      // 显示飘字
      showFloatingText(element, '+1');
    }
    
    // 页面加载时开始5秒倒计时
    window.addEventListener('load', startFiveSecondCountdown);
    
    // 游戏结束弹窗
    function showGameOver(score) {
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOverModal').classList.add('show');
    }
    
    function closeGameOver() {
      document.getElementById('gameOverModal').classList.remove('show');
      // 重新开始游戏
      location.reload();
    }
    
    function exitToHome() {
      document.getElementById('gameOverModal').classList.remove('show');
      // 返回首页
      window.location.href = 'index.html';
    }
    
    function showFloatingText(element, text) {
      const rect = element.getBoundingClientRect();
      const floatEl = document.createElement('div');
      floatEl.className = 'floating-text';
      floatEl.textContent = text;
      floatEl.style.left = rect.left + rect.width / 2 - 20 + 'px';
      floatEl.style.top = rect.top + 'px';
      document.body.appendChild(floatEl);
      
      setTimeout(() => {
        floatEl.remove();
      }, 1000);
    }
    
    function heavyAttack() {
      // TODO: 实现重锤逻辑
      console.log('重锤攻击');
    }
    
    function switchWeapon() {
      // TODO: 实现武器切换逻辑
      console.log('切换武器');
    }
  </script>
</body>
</html>
