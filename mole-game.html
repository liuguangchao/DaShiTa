<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>打地鼠模式</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: #A8D56C;
    }
    .game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      background-image: url('./images/grass-bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    
    /* 顶部圆角卡片 */
    .top-card {
      margin: 12px 12px 8px;
      background: linear-gradient(180deg, #FFE082 0%, #FFD54F 100%);
      border-radius: 20px;
      border: 3px solid #F57F17;
      box-shadow: 0 4px 0 #F57F17, 0 8px 16px rgba(0,0,0,0.15);
      padding: 12px 16px;
      position: relative;
      z-index: 10;
    }
    .top-card-row1 {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .back-btn {
      width: 44px;
      height: 44px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #F57F17;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      border: 2px solid #FFD54F;
    }
    .game-title {
      font-size: 36px;
      font-weight: 900;
      color: #5D4037;
      text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
      letter-spacing: 2px;
    }
    .stats-panel {
      text-align: right;
      color: #5D4037;
      font-size: 13px;
      line-height: 1.5;
    }
    .stats-panel .time-label { font-weight: bold; font-size: 15px; }
    .stats-panel .time-value { font-size: 18px; font-weight: 900; }
    .stats-panel .damage-label { font-size: 12px; opacity: 0.8; }
    .stats-panel .damage-value { font-size: 22px; font-weight: 900; color: #E65100; }
    
    /* 游戏区域 */
    .game-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin: 8px 12px;
    }
    
    /* 草地装饰 */
    .grass-decoration {
      position: absolute;
      font-size: 24px;
      opacity: 0.6;
      pointer-events: none;
    }
    .flower1 { top: 20px; left: 30px; font-size: 30px; }
    .flower2 { top: 60px; right: 40px; }
    .flower3 { bottom: 100px; left: 50px; }
    .flower4 { bottom: 60px; right: 60px; font-size: 20px; }
    .flower5 { top: 150px; left: 80px; font-size: 18px; }
    .bush1 { top: 40px; right: 20px; font-size: 36px; }
    .rock1 { top: 30px; left: 10px; font-size: 28px; }
    
    .moles-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .mole-hole {
      position: absolute;
      width: 120px;
      height: 140px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      cursor: pointer;
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      transition: transform 0.1s;
    }
    .mole-hole:active {
      transform: scale(0.95);
    }
    .hole-base {
      width: 120px;
      height: 74px;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      background-image: url('./images/mole-hole.png');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
    }
    .mole-face-wrapper {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 100px;
      z-index: 2;
      display: none;
    }
    .mole-face-wrapper.visible {
      display: block;
    }
    .mole-face-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    
    /* 特效标记 */
    
    /* 底部圆角卡片 */
    .bottom-card {
      margin: 8px 12px 12px;
      background: linear-gradient(180deg, #FFF8E1 0%, #FFE0B2 100%);
      border-radius: 24px;
      border: 3px solid #FFB300;
      box-shadow: 0 4px 0 #FFB300, 0 8px 16px rgba(0,0,0,0.15);
      padding: 16px;
      position: relative;
      z-index: 10;
    }
    .weapon-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .action-buttons {
      flex: 1;
      display: flex;
      gap: 12px;
    }
    
    /* 跟随鼠标的武器 */
    .cursor-weapon {
      position: fixed;
      pointer-events: none;
      font-size: 40px;
      z-index: 100000;
      transform: translate(-50%, -50%);
      transition: font-size 0.2s;
      filter: drop-shadow(2px 4px 4px rgba(0,0,0,0.3));
      display: block !important;
    }
    .cursor-weapon.hit {
      animation: weaponHit 0.2s ease-out;
    }
    @keyframes weaponHit {
      0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
      50% { transform: translate(-50%, -50%) rotate(-30deg) scale(1.3); }
      100% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
    }
    .action-btn {
      flex: 1;
      height: 65px;
      border: none;
      border-radius: 32px;
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,0.25);
      transition: transform 0.1s;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .action-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.25);
    }
    .btn-heavy {
      background: linear-gradient(135deg, #FF6B35, #FF8C42);
      box-shadow: 0 5px 0 #E65100;
    }
    .btn-switch {
      background: linear-gradient(135deg, #FFB300, #FFD54F);
      color: #5D4037;
      box-shadow: 0 5px 0 #FF8F00;
    }
    
    /* 飘字效果 */
    .floating-text {
      position: absolute;
      color: #FFD700;
      font-size: 28px;
      font-weight: 900;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.6), 0 0 10px rgba(255,215,0,0.5);
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      z-index: 100;
    }
    
    /* 5秒倒计时遮罩 */
    .countdown-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s;
    }
    .countdown-overlay.hidden {
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }
    .countdown-number {
      font-size: 120px;
      font-weight: 900;
      color: #FFD700;
      text-shadow: 0 0 30px rgba(255,215,0,0.8);
      animation: countdownPulse 1s ease-in-out infinite;
    }
    .countdown-text {
      font-size: 24px;
      color: #fff;
      margin-top: 20px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    @keyframes countdownPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    
    /* 游戏结束弹窗 */
    .game-over-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .game-over-modal.show {
      display: flex;
    }
    .game-over-card {
      background: linear-gradient(135deg, #FFF8E1, #FFE082);
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      border: 3px solid #FFB300;
      animation: modalPopIn 0.4s ease-out;
      max-width: 320px;
      width: 90%;
    }
    @keyframes modalPopIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .game-over-emoji {
      font-size: 60px;
      margin-bottom: 15px;
    }
    .game-over-title {
      font-size: 28px;
      font-weight: 900;
      color: #E65100;
      margin-bottom: 10px;
    }
    .game-over-score {
      font-size: 48px;
      font-weight: 900;
      color: #FF6F00;
      margin: 15px 0;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }
    .game-over-label {
      font-size: 16px;
      color: #5D4037;
      margin-bottom: 25px;
    }
    .game-over-btn {
      background: linear-gradient(135deg, #FFB300, #FF8F00);
      color: #fff;
      border: none;
      padding: 10px 30px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 0 #E65100;
      transition: transform 0.1s;
    }
    .game-over-btn.exit-btn {
      background: linear-gradient(135deg, #9E9E9E, #757575);
      box-shadow: 0 4px 0 #616161;
    }
    .game-over-btn.exit-btn:active {
      box-shadow: 0 2px 0 #616161;
    }
    .game-over-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <!-- 顶部圆角卡片 -->
    <div class="top-card">
      <div class="top-card-row1">
        <div class="back-btn" onclick="window.history.back()">←</div>
        <div class="game-title">打地鼠模式</div>
        <div class="stats-panel">
          <div class="time-label">剩余时间</div>
          <div class="time-value">01:30</div>
          <div class="damage-label">打鼠数量</div>
          <div class="damage-value">0</div>
        </div>
      </div>
    </div>
    
    <!-- 游戏区域 -->
    <div class="game-area">
      <!-- 草地装饰 -->
      <div class="grass-decoration flower1">🌸</div>
      <div class="grass-decoration flower2">🌼</div>
      <div class="grass-decoration flower3">🌺</div>
      <div class="grass-decoration flower4">🌻</div>
      <div class="grass-decoration flower5">🌷</div>
      <div class="grass-decoration bush1">🌿</div>
      <div class="grass-decoration rock1">🪨</div>
      
      <!-- 地鼠网格 - 随机分布 -->
      <div class="moles-grid" id="molesGrid">
        <div class="mole-hole" onclick="hitMole(this)">
          <div class="mole-face-wrapper">
          </div>
          <div class="hole-base"></div>
        </div>
        <div class="mole-hole" onclick="hitMole(this)">
          <div class="mole-face-wrapper">
          </div>
          <div class="hole-base"></div>
        </div>
        <div class="mole-hole" onclick="hitMole(this)">
          <div class="mole-face-wrapper">
          </div>
          <div class="hole-base"></div>
        </div>
        <div class="mole-hole" onclick="hitMole(this)">
          <div class="mole-face-wrapper">
          </div>
          <div class="hole-base"></div>
        </div>
        <div class="mole-hole" onclick="hitMole(this)">
          <div class="mole-face-wrapper">
          </div>
          <div class="hole-base"></div>
        </div>
        <div class="mole-hole" onclick="hitMole(this)">
          <div class="mole-face-wrapper">
          </div>
          <div class="hole-base"></div>
        </div>
        <div class="mole-hole" onclick="hitMole(this)">
          <div class="mole-face-wrapper">
          </div>
          <div class="hole-base"></div>
        </div>
      </div>
    </div>
    
    <!-- 游戏结束弹窗 -->
    <div class="game-over-modal" id="gameOverModal">
      <div class="game-over-card">
        <div class="game-over-emoji">🎉</div>
        <div class="game-over-title">时间到！</div>
        <div class="game-over-score" id="finalScore">0</div>
        <div class="game-over-label">只老鼠被你打死</div>
        <div class="game-over-buttons">
          <button class="game-over-btn" onclick="closeGameOver()">再来一局</button>
          <button class="game-over-btn exit-btn" onclick="exitToHome()">返回首页</button>
        </div>
      </div>
    </div>
    
    <!-- 5秒倒计时遮罩 -->
    <div class="countdown-overlay" id="countdownOverlay">
      <div class="countdown-number" id="countdownNumber">5</div>
      <div class="countdown-text">游戏即将开始...</div>
    </div>
    
    <!-- 底部圆角卡片 -->
    <div class="bottom-card">
      <div class="weapon-actions">
        <div class="action-buttons">
          <button class="action-btn btn-heavy" onclick="heavyAttack()">重锤</button>
          <button class="action-btn btn-switch" onclick="switchWeapon()">切换武器</button>
        </div>
      </div>
    </div>
    
    <!-- 跟随鼠标的武器 -->
    <div class="cursor-weapon" id="cursorWeapon">🪓</div>
  </div>

  <script src="js/app.js"></script>
  <script>
    let score = 0;
    let timeLeft = 90;
    let gameTimer = null;
    let countdownTimer = null;
    let currentWeapon = '🪓'; // 默认木制锤子
    
    // 武器列表
    const weaponList = ['🪓', '🔨', '🥖', '🥄', '🧤'];
    const weaponNames = ['木斧', '锤子', '法棍', '汤勺', '手套'];
    let selectedIndex = 0;
    
    // 获取锤子元素
    const cursorWeaponEl = document.getElementById('cursorWeapon');
    
    // 初始位置：屏幕中央
    if (cursorWeaponEl) {
      cursorWeaponEl.style.left = (window.innerWidth / 2) + 'px';
      cursorWeaponEl.style.top = (window.innerHeight / 2) + 'px';
    }
    
    // 鼠标移动事件 - 直接更新武器位置
    document.addEventListener('mousemove', (e) => {
      if (cursorWeaponEl) {
        cursorWeaponEl.style.left = e.clientX + 'px';
        cursorWeaponEl.style.top = e.clientY + 'px';
      }
    });
    
    // 移动端触摸支持
    document.addEventListener('touchmove', (e) => {
      if (cursorWeaponEl && e.touches.length > 0) {
        cursorWeaponEl.style.left = e.touches[0].clientX + 'px';
        cursorWeaponEl.style.top = e.touches[0].clientY + 'px';
      }
    });
    
    // ===== 打地鼠游戏逻辑 =====
    // 3种老鼠，每种有正常和敲晕2张图
    const moleTypes = [
      { normal: './images/mole-normal-1.png', hit: './images/mole-hit-1.png' },
      { normal: './images/mole-normal-2.png', hit: './images/mole-hit-2.png' },
      { normal: './images/mole-normal-3.png', hit: './images/mole-hit-3.png' },
    ];
    
    // 7个洞的状态
    let holes = []; // 延迟初始化
    const holeStates = Array(7).fill(null); // null=无老鼠, {type, hit=false/true, timer}=有老鼠
    
    // 获取洞元素
    function getHoles() {
      if (holes.length === 0) {
        holes = document.querySelectorAll('.mole-hole');
      }
      return holes;
    }
    
    // 随机生成7个洞的位置，保证不重叠
    function generateMolePositions() {
      const grid = document.getElementById('molesGrid');
      const gridRect = grid.getBoundingClientRect();
      const holeSize = 130; // 每个洞的宽高
      const minGap = 100; // 最小间距，保证老鼠不重叠
      
      const positions = [];
      const maxAttempts = 500;
      
      // 先放置第一个洞在中心附近
      const centerX = gridRect.width / 2 - holeSize / 2;
      const centerY = gridRect.height / 2 - holeSize / 2;
      positions.push({ 
        x: centerX + (Math.random() - 0.5) * 50, 
        y: centerY + (Math.random() - 0.5) * 50 
      });
      
      // 随机放置剩余6个洞
      for (let i = 1; i < 7; i++) {
        let placed = false;
        let attempts = 0;
        
        while (!placed && attempts < maxAttempts) {
          attempts++;
          const x = Math.random() * (gridRect.width - holeSize);
          const y = Math.random() * (gridRect.height - holeSize);
          
          // 检查是否与已有洞重叠
          let overlap = false;
          for (const pos of positions) {
            const dx = x - pos.x;
            const dy = y - pos.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < minGap) {
              overlap = true;
              break;
            }
          }
          
          if (!overlap) {
            positions.push({ x, y });
            placed = true;
          }
        }
        
        if (!placed) {
          console.warn(`无法在第${i + 1}个洞找到合适位置，使用备用位置`);
          // 使用备用位置：均匀分布
          const angle = (i / 6) * Math.PI * 2;
          const radius = Math.min(gridRect.width, gridRect.height) * 0.3;
          positions.push({
            x: centerX + Math.cos(angle) * radius - holeSize / 2,
            y: centerY + Math.sin(angle) * radius - holeSize / 2
          });
        }
      }
      
      return positions;
    }
    
    // 初始化洞的位置
    function initMoles() {
      const grid = document.getElementById('molesGrid');
      const allHoles = getHoles(); // 获取最新的洞元素
      const positions = generateMolePositions();
      
      // 确保洞元素存在
      if (!allHoles || allHoles.length < 7) {
        console.error(`洞元素不足: ${allHoles ? allHoles.length : 0}`);
        return;
      }
      
      positions.forEach((pos, idx) => {
        const hole = allHoles[idx];
        if (hole) {
          hole.style.left = pos.x + 'px';
          hole.style.top = pos.y + 'px';
        }
      });
    }
    
    // 页面加载时初始化
    window.addEventListener('load', () => {
      setTimeout(initMoles, 100);
    });
    
    // 窗口大小变化时重新生成
    window.addEventListener('resize', () => {
      setTimeout(initMoles, 100);
    });
    
    // 随机出现老鼠
    function spawnMole() {
      // 随机选一个没有老鼠的洞
      const emptyIndices = [];
      for (let i = 0; i < 7; i++) {
        if (!holeStates[i]) emptyIndices.push(i);
      }
      if (emptyIndices.length === 0) return;
      
      const idx = emptyIndices[Math.floor(Math.random() * emptyIndices.length)];
      const typeIdx = Math.floor(Math.random() * moleTypes.length);
      const mole = moleTypes[typeIdx];
      
      holeStates[idx] = { type: typeIdx, hit: false };
      
      const hole = holes[idx];
      const faceWrapper = hole.querySelector('.mole-face-wrapper');
      faceWrapper.innerHTML = `<img src="${mole.normal}" style="width:100px;height:100px;object-fit:contain;display:block;" />`;
      faceWrapper.classList.add('visible');
      
      // 1.5~3秒后自动消失
      const disappearTime = 1500 + Math.random() * 1500;
      holeStates[idx].timer = setTimeout(() => {
        hideMole(idx);
      }, disappearTime);
    }
    
    // 隐藏老鼠
    function hideMole(idx) {
      if (!holeStates[idx]) return;
      clearTimeout(holeStates[idx].timer);
      const hole = holes[idx];
      const faceWrapper = hole.querySelector('.mole-face-wrapper');
      faceWrapper.classList.remove('visible');
      holeStates[idx] = null;
    }
    
    // 定时出现老鼠，同时最多2只
    let moleSpawnInterval = null;
    function startMoleSpawning() {
      // 每0.8~1.5秒尝试出现一只
      moleSpawnInterval = setInterval(() => {
        // 统计当前活跃的老鼠数量
        let activeCount = 0;
        for (let i = 0; i < 7; i++) {
          if (holeStates[i] && !holeStates[i].hit) activeCount++;
        }
        if (activeCount < 2) {
          spawnMole();
        }
      }, 800 + Math.random() * 700);
    }
    
    // 点击打老鼠
    function hitMole(element) {
      // 武器打击动画
      if (cursorWeaponEl) {
        cursorWeaponEl.classList.remove('hit');
        void cursorWeaponEl.offsetWidth; // 触发重绘
        cursorWeaponEl.classList.add('hit');
        setTimeout(() => {
          cursorWeaponEl.classList.remove('hit');
        }, 200);
      }
      
      // 找到这个洞的索引
      const idx = Array.from(getHoles()).indexOf(element);
      if (idx === -1 || !holeStates[idx] || holeStates[idx].hit) return;
      
      const state = holeStates[idx];
      state.hit = true;
      clearTimeout(state.timer);
      
      // 显示敲晕图片
      const mole = moleTypes[state.type];
      const faceWrapper = element.querySelector('.mole-face-wrapper');
      faceWrapper.innerHTML = `<img src="${mole.hit}" style="width:100px;height:100px;object-fit:contain;display:block;" />`;
      faceWrapper.classList.add('visible');
      
      // 打鼠数量 +1
      score++;
      document.querySelector('.damage-value').textContent = score;
      
      // 显示飘字
      showFloatingText(element, '+1');
      
      // 1秒后消失
      setTimeout(() => {
        hideMole(idx);
      }, 1000);
    }
    
    // 5秒倒计时
    function startFiveSecondCountdown() {
      let count = 5;
      const overlay = document.getElementById('countdownOverlay');
      const numberEl = document.getElementById('countdownNumber');
      
      countdownTimer = setInterval(() => {
        count--;
        if (count > 0) {
          numberEl.textContent = count;
        } else {
          // 倒计时结束，隐藏遮罩
          clearInterval(countdownTimer);
          overlay.classList.add('hidden');
          setTimeout(() => {
            overlay.style.display = 'none';
            startGame(); // 启动游戏
          }, 500);
        }
      }, 1000);
    }
    
    // 游戏倒计时（90秒）
    function startGameCountdown() {
      gameTimer = setInterval(() => {
        timeLeft--;
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.querySelector('.time-value').textContent = 
          `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        if (timeLeft <= 0) {
          clearInterval(gameTimer);
          // 停止出老鼠
          if (moleSpawnInterval) {
            clearInterval(moleSpawnInterval);
            moleSpawnInterval = null;
          }
          showGameOver(score);
        }
      }, 1000);
    }
    
    // 页面加载时开始5秒倒计时
    window.addEventListener('load', startFiveSecondCountdown);
    
    // 游戏结束弹窗
    function showGameOver(score) {
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOverModal').classList.add('show');
    }
    
    function closeGameOver() {
      document.getElementById('gameOverModal').classList.remove('show');
      // 重新开始游戏
      location.reload();
    }
    
    function exitToHome() {
      document.getElementById('gameOverModal').classList.remove('show');
      // 返回首页
      window.location.href = 'index.html';
    }
    
    function showFloatingText(element, text) {
      const rect = element.getBoundingClientRect();
      const floatEl = document.createElement('div');
      floatEl.className = 'floating-text';
      floatEl.textContent = text;
      floatEl.style.left = rect.left + rect.width / 2 - 20 + 'px';
      floatEl.style.top = rect.top + 'px';
      document.body.appendChild(floatEl);
      
      setTimeout(() => {
        floatEl.remove();
      }, 1000);
    }
    
    function heavyAttack() {
      // TODO: 实现重锤逻辑
      console.log('重锤攻击');
    }
    
    function switchWeapon() {
      // 弹出toast提示
      showToast('从背包中选择武器');
    }
    
    // 5秒倒计时结束后启动游戏
    function startGame() {
      startMoleSpawning(); // 开始出老鼠
      startGameCountdown(); // 开始90秒倒计时
    }
  </script>
</body>
</html>
