<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>排行榜</title>
<link rel="stylesheet" href="css/common.css">
<style>
/* ===== 排行榜页面专用样式 ===== */
#leaderboardPage{background:linear-gradient(180deg,#FFE066 0%,#FFD166 30%,#FFB347 100%)}

/* Tab 切换样式 */
.leaderboard-tabs{display:flex;gap:0;margin:8px 16px 0;border-radius:20px;overflow:hidden;background:rgba(255,255,255,.3)}
.leaderboard-tab{flex:1;padding:10px 0;text-align:center;font-size:15px;color:#5C3300;cursor:pointer;white-space:nowrap;transition:all .3s;font-weight:500;border:none;background:transparent}
.leaderboard-tab.active{background:linear-gradient(135deg,#FFE066,#FFB347);color:#5C3300;font-weight:700}

/* 排名列表容器 */
.rank-wrapper{margin:8px 16px;display:flex;flex-direction:column;max-height:calc(100vh - 240px)}

/* Top 3 样式 */
.rank-top3{display:flex;justify-content:center;align-items:flex-end;gap:8px;padding:16px 8px 12px;flex-shrink:0}
.rank-crown{background:rgba(255,255,255,.7);border-radius:16px;padding:12px 8px;text-align:center;border:1px solid rgba(255,255,255,.5);transition:transform .3s}
.rank-crown.r1{order:2;width:140px;transform:scale(1.15);margin-bottom:16px;z-index:1}
.rank-crown.r2{order:1;width:110px}
.rank-crown.r3{order:3;width:110px}
.rank-crown .rn{font-size:12px;font-weight:700;color:#FF6B6B}
.rank-crown .ravatar{font-size:36px;margin:8px 0}
.rank-crown .rname{font-size:13px;font-weight:700;color:#333;margin-bottom:4px}
.rank-crown .rscore{font-size:14px;font-weight:700;color:#FF6B6B}

/* 滚动列表 */
.rank-scroll{flex:1;overflow-y:auto;margin-top:8px}
.rank-list{background:rgba(255,255,255,.7);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.5)}
.rank-item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.05)}
.rank-item:last-child{border-bottom:none}
.rank-item.me{background:rgba(255,224,102,.3);border-left:3px solid #FFB347}
.rank-num{width:40px;font-size:16px;font-weight:700;color:#666}
.rank-num.top3{color:#FF6B6B}
.rank-avatar{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:22px;margin-right:12px;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:14px;font-weight:600;color:#333;margin-bottom:2px}
.rank-desc{font-size:12px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-score{font-size:15px;font-weight:700;color:#FF6B6B;margin-left:12px;flex-shrink:0}

/* 自己数据卡片 */
.my-rank-card{margin-top:12px;padding:16px;background:rgba(255,255,255,.8);border-radius:16px;border:1px solid rgba(255,255,255,.5);flex-shrink:0}
.my-rank-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.my-rank-title{font-size:14px;font-weight:600;color:#5C3300}
.my-rank-badge{padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600}
.my-rank-badge.on-list{background:linear-gradient(135deg,#FFE066,#FFB347);color:#5C3300}
.my-rank-badge.off-list{background:rgba(255,255,255,.5);color:#999}
.my-rank-content{display:flex;align-items:center}
.my-rank-avatar{width:50px;height:50px;border-radius:50%;background:rgba(255,224,102,.3);display:flex;align-items:center;justify-content:center;font-size:28px;margin-right:12px}
.my-rank-info{flex:1}
.my-rank-name{font-size:15px;font-weight:700;color:#333;margin-bottom:4px}
.my-rank-stats{display:flex;gap:16px;font-size:13px;color:#666}
.my-rank-stats span{display:flex;align-items:center;gap:4px}
.my-rank-stats strong{color:#FF6B6B;font-size:16px}
</style>
</head>
<body>

<!-- ===================== 4. 排行榜 ===================== -->
<div class="page active" id="leaderboardPage">
  <div class="bar-top">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <div class="title-center">排行榜</div>
    <div class="icon-btn" style="width:auto;padding:0 12px;height:36px;border-radius:18px;font-size:13px" onclick="showToast('隐私设置')">隐私设置</div>
  </div>
  
  <!-- Tab 切换 -->
  <div class="leaderboard-tabs">
    <div class="leaderboard-tab" onclick="switchLeaderboard(this, 'mole')">打地鼠</div>
    <div class="leaderboard-tab active" onclick="switchLeaderboard(this, 'figure')">打屎他</div>
  </div>
  
  <div class="rank-wrapper" id="rankWrapper">
    <!-- Top 3 -->
    <div class="rank-top3" id="rankTop3"></div>
    
    <!-- 滚动列表 -->
    <div class="rank-scroll">
      <div class="rank-list" id="rankList"></div>
    </div>
    
    <!-- 自己的数据 -->
    <div class="my-rank-card" id="myRankCard"></div>
  </div>
</div>

/* ===== 当前选中的榜单 ===== */
var currentBoard = 'figure';

/* ===== 渲染 Top 3 ===== */
function renderTop3(data){
  var container = document.getElementById('rankTop3');
  var html = '';
  
  var sorted = data.top3.sort(function(a, b){ return a.rank - b.rank; });
  
  for(var i = 0; i < sorted.length; i++){
    var item = sorted[i];
    html += '<div class="rank-crown r' + item.rank + '">' +
      '<span class="rn">' + item.rank + '</span>' +
      '<div class="ravatar">' + item.avatar + '</div>' +
      '<div class="rname">' + item.name + '</div>' +
      '<div style="font-size:11px;color:#8B6914">' + item.desc + '</div>' +
      '<div class="rscore">' + item.score.toLocaleString() + '</div>' +
    '</div>';
  }
  
  container.innerHTML = html;
}

/* ===== 渲染列表 ===== */
function renderList(data){
  var container = document.getElementById('rankList');
  var html = '';
  
  for(var i = 0; i < data.list.length; i++){
    var item = data.list[i];
    var isTop3 = item.rank <= 3;
    html += '<div class="rank-item">' +
      '<span class="rank-num' + (isTop3 ? ' top3' : '') + '">' + item.rank + '</span>' +
      '<div class="rank-avatar">' + item.avatar + '</div>' +
      '<div class="rank-info">' +
        '<div class="rank-name">' + item.name + '</div>' +
        '<div class="rank-desc">' + item.desc + '</div>' +
      '</div>' +
      '<span class="rank-score">' + item.score.toLocaleString() + '</span>' +
    '</div>';
  }
  
  container.innerHTML = html;
}

/* ===== 渲染自己的数据 ===== */
function renderMyRank(data){
  var container = document.getElementById('myRankCard');
  var my = data.myRank;
  var isOnList = my.rank <= 20;
  
  var html = '<div class="my-rank-header">' +
    '<span class="my-rank-title">我的排名</span>' +
    '<span class="my-rank-badge ' + (isOnList ? 'on-list' : 'off-list') + '">' +
      (isOnList ? '第' + my.rank + '名 · 已上榜' : '未上榜') +
    '</span>' +
  '</div>' +
  '<div class="my-rank-content">' +
    '<div class="my-rank-avatar">' + my.avatar + '</div>' +
    '<div class="my-rank-info">' +
      '<div class="my-rank-name">' + my.name + '</div>' +
      '<div class="my-rank-stats">' +
        '<span>排名: <strong>' + (isOnList ? my.rank : '—') + '</strong></span>' +
        '<span>分数: <strong>' + my.score.toLocaleString() + '</strong></span>' +
      '</div>' +
    '</div>' +
  '</div>';
  
  container.innerHTML = html;
}

/* ===== 切换榜单 ===== */
function switchLeaderboard(el, type){
  // 更新 Tab 样式
  el.parentElement.querySelectorAll('.leaderboard-tab').forEach(function(tab){
    tab.classList.remove('active');
  });
  el.classList.add('active');
  
  // 切换数据
  currentBoard = type;
  var data = leaderboardData[type];
  renderTop3(data);
  renderList(data);
  renderMyRank(data);
}

/* ===== 初始化 ===== */
window.addEventListener('DOMContentLoaded', function(){
  var data = leaderboardData[currentBoard];
  renderTop3(data);
  renderList(data);
  renderMyRank(data);
});
</script>

</html>
