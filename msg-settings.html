<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>消息设置</title><link rel="stylesheet" href="css/common.css"></head><body><!-- ===================== 2. 消息设置 ===================== -->
<div class="page" id="msgSettingsPage">
  <div class="bar-top">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <div class="title-center">消息设置</div>
    <div style="width:40px"></div>
  </div>
  <div style="padding-bottom:20px">
    <div class="card">
      <div style="font-size:18px;font-weight:700;margin-bottom:12px">消息推送开关</div>
      <div class="list-row"><div class="label">系统通知<div class="desc">已开启</div></div><div class="toggle on" onclick="this.classList.toggle(&#39;on&#39;)"></div></div>
      <div class="list-row"><div class="label">奖励到账<div class="desc">已开启</div></div><div class="toggle on" onclick="this.classList.toggle(&#39;on&#39;)"></div></div>
      <div class="list-row"><div class="label">成就解锁<div class="desc">已开启</div></div><div class="toggle on" onclick="this.classList.toggle(&#39;on&#39;)"></div></div>
      <div class="list-row"><div class="label">活动通知<div class="desc">已开启</div></div><span class="arrow">›</span></div>
      <div class="list-row"><div class="label">互动提醒<div class="desc">已开启</div></div><div class="toggle on" onclick="this.classList.toggle(&#39;on&#39;)"></div></div>
      <div class="list-row"><div class="label">玩法提醒<div class="desc">已开启</div></div><div class="toggle on" onclick="this.classList.toggle(&#39;on&#39;)"></div></div>
    </div>
    <div class="card">
      <div style="font-size:18px;font-weight:700;margin-bottom:12px">消息免打扰</div>
      <div class="list-row"><div class="label">玩法期间免打扰<div class="desc">已关闭</div></div><div class="toggle" onclick="this.classList.toggle(&#39;on&#39;)"></div></div>
      <div class="list-row"><div class="label">夜间免打扰<div class="desc">已关闭</div></div><span class="arrow">›</span></div>
    </div>
    <div style="display:flex;gap:10px;padding:0 16px">
      <button class="btn-gray" style="flex:1" onclick="document.querySelectorAll(&#39;.toggle&#39;).forEach(t=&gt;t.classList.add(&#39;on&#39;))">一键开启所有推送</button>
      <button class="btn-gold" style="flex:1" onclick="saveMsgSettings()">保存设置</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script></body></html>
