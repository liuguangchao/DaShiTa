<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>虚拟人物打击模式</title><link rel="stylesheet" href="css/common.css"></head><body><!-- ===================== 7. 虚拟人物打击 ===================== -->
<div class="page" id="figureGamePage">
  <div class="game-bar" style="background:linear-gradient(180deg,#FFE066,#FFB347)">
    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <div class="gb-title">虚拟人物打击模式</div>
    <div class="gb-stats">
      <div class="gb-stat">累计伤害</div>
      <div class="gb-val" id="figureScore">12850</div>
    </div>
  </div>
  <div style="padding:0 16px;margin-top:8px;display:flex;justify-content:space-between;align-items:center">
    <button class="btn-gray" style="padding:8px 14px;border-radius:12px">➖</button>
    <div style="font-size:16px;font-weight:700;color:#5C3300;text-align:right">剩余时间<br>无限</div>
  </div>

  <div class="figure-scene" id="figureScene">
    <div style="position:absolute;top:10px;left:0;right:0;text-align:center">
      <div style="font-size:16px;font-weight:700;color:#FF6B35">讨厌的同事</div>
    </div>
    <div class="figure-person" onclick="hitFigure(this)">🧑‍💼</div>
    <div style="position:absolute;top:120px;left:40px;font-size:18px;font-weight:700;color:#FF4444">拳打</div>
    <div style="position:absolute;top:180px;left:20px;font-size:18px;font-weight:700;color:#FF4444">脚踢</div>
    <div style="position:absolute;bottom:120px;left:50px;font-size:18px;font-weight:700;color:#FF4444">扇耳光</div>
    <div style="position:absolute;bottom:120px;right:50px;font-size:18px;font-weight:700;color:#FF4444">扇耳光</div>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;padding:0 16px 20px">
    <div>
      <div style="font-size:14px;color:#8B6914">求饶几率</div>
      <div style="font-size:30px;font-weight:900;color:#FF6B35">15%</div>
    </div>
    <button class="btn-gold" style="font-size:18px;padding:12px 28px" onclick="showToast(&#39;触发特效！&#39;)">触发特效</button>
  </div>
</div>

<script src="js/app.js"></script></body></html>
