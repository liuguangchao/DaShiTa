<title>消息中心</title>

<style>
/* ===== 消息列表页面专用样式 ===== */
#msgListPage{background:linear-gradient(180deg,#FFE066 0%,#FFD166 30%,#FFB347 100%)}
.title-center{background:transparent!important}
.msg-container{background:rgba(255,255,255,.85);border-radius:28px;margin:8px 10px 16px;min-height:calc(100vh - 100px);display:flex;flex-direction:column}
.msg-tabs{display:flex;gap:0;width:100%;flex-shrink:0}
.msg-tab{flex:1;padding:10px 0;text-align:center;font-size:15px;color:#5C3300;cursor:pointer;white-space:nowrap;transition:all .3s;font-weight:500;border:none;background:transparent}
.msg-tab.active{background:linear-gradient(135deg,#FFE066,#FFB347);color:#5C3300;font-weight:700;border-radius:20px}
.msg-list{padding:12px 10px;max-height:calc(100vh - 280px);overflow-y:auto}
.msg-card{background:rgba(255,255,255,.6);border-radius:16px;padding:14px;margin-bottom:10px;border:1px solid rgba(255,255,255,.5);cursor:pointer;transition:all .15s;position:relative}
.msg-card:active{transform:scale(.98);background:rgba(255,224,102,.3)}
.msg-card.has-border{border-left:4px solid #2196F3}
.msg-card.unread{background:rgba(255,224,102,.25);border-color:rgba(255,224,102,.5)}
.msg-card.unread::before{content:'';position:absolute;top:12px;right:12px;width:8px;height:8px;background:#FF6B6B;border-radius:50%}
.msg-card-inner{display:flex;gap:12px;align-items:flex-start}
.msg-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.msg-icon.reward{background:linear-gradient(135deg,#FFE066,#FFB347)}
.msg-icon.achievement{background:linear-gradient(135deg,#4CAF50,#45a049)}
.msg-icon.activity{background:linear-gradient(135deg,#2196F3,#1976D2)}
.msg-icon.activity-orange{background:linear-gradient(135deg,#FF7043,#F4511E)}
.msg-icon.gameplay{background:linear-gradient(135deg,#2196F3,#1976D2)}
.msg-content{flex:1;min-width:0}
.msg-title{font-size:15px;font-weight:700;color:#333;margin-bottom:4px;line-height:1.3}
.msg-desc{font-size:13px;color:#999;margin-bottom:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-time{font-size:13px;color:#999;flex-shrink:0;margin-left:8px;align-self:flex-start;margin-top:2px}
.msg-empty{text-align:center;padding:20px;color:#ccc;font-size:14px}

/* ===== 批量操作样式 ===== */
.batch-mode .msg-checkbox{display:flex!important}
.msg-checkbox{display:none!important;position:absolute;left:8px;top:50%;transform:translateY(-50%);z-index:10}
.msg-checkbox input{width:22px;height:22px;cursor:pointer;accent-color:#FFE066}
.batch-mode .msg-card-inner{margin-left:28px}
.batch-mode .msg-card{padding-left:38px}

/* ===== 底部操作栏 ===== */
.batch-footer{display:none;padding:12px 16px;background:rgba(255,255,255,.95);border-top:1px solid rgba(0,0,0,.1);gap:12px;flex-shrink:0}
.batch-footer.show{display:flex}
.batch-footer-btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.batch-footer-btn.clear{background:linear-gradient(135deg,#FFE066,#FFB347);color:#5C3300}
.batch-footer-btn.delete{background:linear-gradient(135deg,#FF6B6B,#EE5A5A);color:#fff}
.batch-footer-btn:active{transform:scale(.95)}
</style>

<div class="page active" id="msgListPage">

    <button class="back-btn" onclick="window.location.href='index.html'">←</button>
    <div class="title-center">消息中心</div>
    <div id="batchBtn" style="display:flex;align-items:center;gap:6px;font-size:15px;font-weight:600;color:#5C3300;cursor:pointer" onclick="toggleBatchMode()">
      <span>批量操作</span>
      <span style="font-size:20px">⚙️</span>
    </div>
  </div>
  
  <div class="msg-container" id="msgContainer">
    <!-- Tab 切换 -->
    <div class="msg-tabs">
      <div class="msg-tab active" onclick="switchMsgTab(this)">全部</div>
      <div class="msg-tab" onclick="switchMsgTab(this)">系统</div>
      <div class="msg-tab" onclick="switchMsgTab(this)">奖励</div>
      <div class="msg-tab" onclick="switchMsgTab(this)">成就</div>
    </div>
    
    <!-- 消息列表 -->
    <div class="msg-list" id="msgList">
      <!-- 动态渲染 -->
    </div>
    
    <!-- 底部操作栏 -->
    <div class="batch-footer" id="batchFooter">
      <button class="batch-footer-btn clear" onclick="clearUnread()">清除未读</button>
      <button class="batch-footer-btn delete" onclick="deleteSelected()">一键删除</button>

</div>

/* ===== 批量操作状态 ===== */
var isBatchMode = false;

/* ===== 渲染消息列表 ===== */
function renderMsgList(type){
  var list = document.getElementById('msgList');
  var msgs = msgData[type] || msgData.all;
  
  // 限制最多8条消息
  var displayMsgs = msgs.slice(0, 8);
  
  var html = '';
  for(var i = 0; i < displayMsgs.length; i++){
    var m = displayMsgs[i];
    var borderClass = m.hasBorder ? ' has-border' : '';
    var unreadClass = m.unread ? ' unread' : '';
    html += '<div class="msg-card' + borderClass + unreadClass + '" onclick="showToast(\'查看详情：' + m.title + '\')">' +
      '<div class="msg-checkbox">' +
        '<input type="checkbox" onclick="event.stopPropagation()">' +
      '</div>' +
      '<div class="msg-card-inner">' +
        '<div class="msg-icon ' + m.type + '">' + m.icon + '</div>' +
        '<div class="msg-content">' +
          '<div class="msg-title">' + m.title + '</div>' +
          '<div class="msg-desc">' + m.desc + '</div>' +
        '</div>' +
        '<div class="msg-time">' + m.time + '</div>' +
      '</div>' +
    '</div>';
  }
  html += '<div class="msg-empty">暂无更多消息</div>';
  list.innerHTML = html;
}

/* ===== 消息 Tab 切换 ===== */
function switchMsgTab(el){
  el.parentElement.querySelectorAll('.msg-tab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  var texts = ['全部','系统','奖励','成就'];
  var types = ['all','system','reward','achievement'];
  for(var i = 0; i < texts.length; i++){
    if(el.textContent.trim() === texts[i]){
      renderMsgList(types[i]);
      break;
    }
  }
}

/* ===== 切换批量操作模式 ===== */
function toggleBatchMode(){
  isBatchMode = !isBatchMode;
  var container = document.getElementById('msgContainer');
  var footer = document.getElementById('batchFooter');
  var batchBtn = document.getElementById('batchBtn');
  
  if(isBatchMode){
    container.classList.add('batch-mode');
    footer.classList.add('show');
    batchBtn.innerHTML = '<span>取消</span>';
  } else {
    container.classList.remove('batch-mode');
    footer.classList.remove('show');
    batchBtn.innerHTML = '<span>批量操作</span><span style="font-size:20px">⚙️</span>';
    // 取消所有勾选
    container.querySelectorAll('.msg-checkbox input').forEach(function(cb){
      cb.checked = false;
    });
  }
}

/* ===== 清除未读 ===== */
function clearUnread(){
  var container = document.getElementById('msgContainer');
  var checkboxes = container.querySelectorAll('.msg-checkbox input:checked');
  
  if(checkboxes.length === 0){
    showToast('请先选择要清除未读的消息');
    return;
  }
  
  // 获取当前显示的消息类型
  var activeTab = document.querySelector('.msg-tab.active');
  var typeName = activeTab ? activeTab.textContent.trim() : '全部';
  var typeMap = {'全部':'all','系统':'system','奖励':'reward','成就':'achievement'};
  var currentType = typeMap[typeName] || 'all';
  
  // 清除选中消息的未读状态
  var clearedCount = 0;
  var msgs = msgData[currentType] || msgData.all;
  for(var i = checkboxes.length - 1; i >= 0; i--){
    var checkbox = checkboxes[i];
    var card = checkbox.closest('.msg-card');
    var index = Array.from(card.parentElement.children).indexOf(card);
    if(index >= 0 && index < msgs.length && msgs[index].unread){
      msgs[index].unread = false;
      clearedCount++;
    }
  }
  
  // 重新渲染列表
  renderMsgList(currentType);
  
  showToast('已清除 ' + clearedCount + ' 条未读消息');
}

/* ===== 一键删除 ===== */
function deleteSelected(){
  var container = document.getElementById('msgContainer');
  var checkboxes = container.querySelectorAll('.msg-checkbox input:checked');
  
  if(checkboxes.length === 0){
    showToast('请先选择要删除的消息');
    return;
  }
  
  // 获取当前显示的消息类型
  var activeTab = document.querySelector('.msg-tab.active');
  var typeName = activeTab ? activeTab.textContent.trim() : '全部';
  var typeMap = {'全部':'all','系统':'system','奖励':'reward','成就':'achievement'};
  var currentType = typeMap[typeName] || 'all';
  
  // 删除选中的消息（从数据中移除）
  var deletedCount = 0;
  var msgs = msgData[currentType] || msgData.all;
  for(var i = checkboxes.length - 1; i >= 0; i--){
    var checkbox = checkboxes[i];
    var card = checkbox.closest('.msg-card');
    var index = Array.from(card.parentElement.children).indexOf(card);
    if(index >= 0 && index < msgs.length){
      msgs.splice(index, 1);
      deletedCount++;
    }
  }
  
  // 重新渲染列表
  renderMsgList(currentType);
  
  showToast('已删除 ' + deletedCount + ' 条消息');
}

/* ===== 初始化 ===== */
window.addEventListener('DOMContentLoaded', function(){
  renderMsgList('all');
});
